name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Release

    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: commit
        run: echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Get build date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          mkdir -p dist

          LDFLAGS="-X main.Version=${{ steps.version.outputs.version }} -X main.Commit=${{ steps.commit.outputs.commit }} -X main.BuildDate=${{ steps.date.outputs.date }}"

          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/tfimport-cli-${{ steps.version.outputs.version }}-linux-amd64 ./cmd/tfimport-cli
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/tfimport-cli-${{ steps.version.outputs.version }}-linux-arm64 ./cmd/tfimport-cli
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/tfimport-cli-${{ steps.version.outputs.version }}-darwin-amd64 ./cmd/tfimport-cli
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/tfimport-cli-${{ steps.version.outputs.version }}-darwin-arm64 ./cmd/tfimport-cli
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/tfimport-cli-${{ steps.version.outputs.version }}-windows-amd64.exe ./cmd/tfimport-cli

      - name: Generate checksums
        run: |
          cd dist
          sha256sum tfimport-cli-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes
            See commit history for details.

            ## Installation
            See [Installation Guide](docs/INSTALL.md) for platform-specific instructions.

            ## Checksum Verification
            ```bash
            sha256sum -c SHA256SUMS
            ```

            ## Build Info
            - Version: ${{ steps.version.outputs.version }}
            - Commit: ${{ steps.commit.outputs.commit }}
            - Build Date: ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false

      - name: Upload Linux AMD64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/tfimport-cli-${{ steps.version.outputs.version }}-linux-amd64
          asset_name: tfimport-cli-${{ steps.version.outputs.version }}-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload Linux ARM64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/tfimport-cli-${{ steps.version.outputs.version }}-linux-arm64
          asset_name: tfimport-cli-${{ steps.version.outputs.version }}-linux-arm64
          asset_content_type: application/octet-stream

      - name: Upload Darwin AMD64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/tfimport-cli-${{ steps.version.outputs.version }}-darwin-amd64
          asset_name: tfimport-cli-${{ steps.version.outputs.version }}-darwin-amd64
          asset_content_type: application/octet-stream

      - name: Upload Darwin ARM64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/tfimport-cli-${{ steps.version.outputs.version }}-darwin-arm64
          asset_name: tfimport-cli-${{ steps.version.outputs.version }}-darwin-arm64
          asset_content_type: application/octet-stream

      - name: Upload Windows AMD64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/tfimport-cli-${{ steps.version.outputs.version }}-windows-amd64.exe
          asset_name: tfimport-cli-${{ steps.version.outputs.version }}-windows-amd64.exe
          asset_content_type: application/octet-stream

      - name: Upload Checksums
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/SHA256SUMS
          asset_name: SHA256SUMS
          asset_content_type: text/plain
